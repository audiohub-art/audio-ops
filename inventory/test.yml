all:
  children:
    k8s_cluster:
      hosts:
        localhost:
          ansible_connection: local
          k8s_host: localhost
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          k8s_namespace: audio-test
          env: test
          secrets: "{{ lookup('pipe', 'keybase fs read /keybase/team/audiohub/secrets.yml') | from_yaml }}"
          app: audio
