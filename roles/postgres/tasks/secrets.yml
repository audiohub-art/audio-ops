- name: Create database credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ app }}-db-credentials"
        namespace: "{{ k8s_namespace }}"
      type: Opaque
      stringData:
        username: "{{ app }}"
        password: "{{ secrets[env].database.password }}"
        database: "{{ app }}"
